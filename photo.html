<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Photo Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .gallery-item {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            cursor: pointer;
        }
        .gallery-item:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }
        .gallery-item img {
            width: 100%;
            display: block;
            transition: transform 0.25s ease, filter 0.25s ease;
        }
        .gallery-item:hover img {
            transform: scale(1.05);
            filter: brightness(1.05);
        }
        .gallery-item .caption {
            padding: 12px;
            text-align: center;
            font-size: 14px;
            color: #333;
            transition: color 0.25s ease;
        }
        .gallery-item:hover .caption {
            color: #007bff;
        }
    </style>
</head>
<body>
    <h1>Simple Photo Gallery</h1>
    <div class="gallery">
        <div class="gallery-item">
            <img src="images/c1.jpg" alt="Photo 1">
            <div class="caption">Photo 1</div>
        </div>
        <div class="gallery-item">
            <img src="images/c2.jpg" alt="Photo 2">
            <div class="caption">Photo 2</div>
        </div>
        <div class="gallery-item">
            <img src="images/c3.jpg" alt="Photo 3">
            <div class="caption">Photo 3</div>
        </div>
        <div class="gallery-item">
            <img src="images/c4.jpg" alt="Photo 4">
            <div class="caption">Photo 4</div>
        </div>
    </div>
</body>
</html>
