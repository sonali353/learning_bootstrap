<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Form Page</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      .navbar {
        background-color: blueviolet;
      }
      .card:hover {
        background-color: blueviolet;
        color: black;
      }
      .bg-Dark {
        background-color: black;
      }
    </style>
  </head>
  <body>
    <main>
      <!-- Form section Start -->
      <section class="mt-5">
        <div class="container">
          <div class="row">
            <h1 class="text-center mb-3">Register</h1>
            <div class="col-md-12 border border-2 border-dark p-5">
              <form>
                <div class="mb-3 ">
                  <label for="usernameexample" class="form-label"
                    >Username</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    placeholder=" Enter Username"
                    id="usernameexample"
                    aria-describedby="Help"
                  />
                  <div id="Help" class="form-text"></div>
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label">Password</label>
                  <input type="password" class="form-control" placeholder=" Enter Your Password" id="password" />
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label"
                    >Confirm Password</label
                  >
                  <input type="password" class="form-control" id="password" />
                  <div class="row mt-3">
                    <div class="col-md-6">
                      <div class="form-check">
                        <input
                          class="form-check-input"
                          placeholder=" Enter Your Password"
                          type="radio"
                          name="radioDefault"
                          id="radioDefault1"
                        />
                        <label class="form-check-label" for="radioDefault1">
                          Male
                        </label>
                      </div>
                    </div>
                    
                    <div class="col-md-6">
                      <div class="form-check">
                        <input
                          class="form-check-input "
                          type="radio"
                          name="radioDefault"
                          id="radioDefault2"
                          checked
                        />
                        <label class="form-check-label" for="radioDefault2">
                          Female
                        </label>
                      </div>
                    </div>
                    <div class="row mt-5">
                        <div class="col-md-12">
                          <select class="form-select form-select-lg mb-3" aria-label="Large select example">
  <option selected>Select Country</option>
  <option value="1">India</option>
  <option value="2">Us</option>
  <option value="3">Uk</option>
  <option value="4">Edinburg</option>
  <option value="5">England</option>
  <option value="6">Canada</option>
  <option value="7">Australia</option>
  <option value="8">Japan</option>
  <option>China</option>
  <option>Singapore</option>
  <option>United Arab Emirates</option>
</select>
                        </div>
                      </div>
                      <div class="row mt-5">
                        <div class="col-md-12">
                          <div class="input-group">
  <input type="text" class="form-control" placeholder="Enter Amount" aria-label="Dollar amount
   (with dot and two decimal places)">
  <span class="input-group-text">Rs</span>
  <span class="input-group-text">0.00</span>
</div>
                        </div>
                      </div>
                      <div class="row mt-5">
                        <div class="col-md-12">
                          <div class="input-group mb-3">
  <input type="file" class="form-control" id="inputGroupFile02">
  <label class="input-group-text" for="inputGroupFile02">Upload</label>
</div>
                        </div>
                      </div>
                  </div>
                </div>

                <div class="mb-3 form-check">
                  <input
                    type="checkbox"
                    class="form-check-input"
                    id="exampleCheck1"
                  />
                  <label class="form-check-label" for="exampleCheck1"
                    >Check me out</label
                  >
                </div>
                <button type="submit" class="btn btn-primary">✅Submit</button>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
